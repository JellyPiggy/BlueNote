server:
  port: 8082

spring:
  application:
    name: bluenote-content-app
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${BLUENOTE_CONTENT_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/bluenote_file?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${BLUENOTE_CONTENT_DATASOURCE_USERNAME:root}
    password: ${BLUENOTE_CONTENT_DATASOURCE_PASSWORD:change_me_local_mysql_root}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${BLUENOTE_REDIS_HOST:127.0.0.1}
      port: ${BLUENOTE_REDIS_PORT:6379}
      password: ${BLUENOTE_REDIS_PASSWORD:change_me_local_redis}
      timeout: 2s

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

bluenote:
  env: ${BLUENOTE_ENV:local}
  storage:
    minio:
      endpoint: ${BLUENOTE_MINIO_ENDPOINT:http://127.0.0.1:9000}
      public-endpoint: ${BLUENOTE_MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${BLUENOTE_MINIO_ACCESS_KEY:bluenote_minio}
      secret-key: ${BLUENOTE_MINIO_SECRET_KEY:change_me_local_minio}
      bucket: ${BLUENOTE_MINIO_BUCKET:bluenote-files}
      upload-url-expires-seconds: ${BLUENOTE_MINIO_UPLOAD_URL_EXPIRES_SECONDS:600}
  internal:
    member-uri: ${BLUENOTE_MEMBER_INTERNAL_URI:http://127.0.0.1:8081}
    counter-uri: ${BLUENOTE_COUNTER_INTERNAL_URI:http://127.0.0.1:8083}
  mq:
    enabled: ${BLUENOTE_MQ_ENABLED:true}
    name-server: ${BLUENOTE_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
    producer-group: ${BLUENOTE_CONTENT_MQ_PRODUCER_GROUP:bluenote-content-outbox-producer}
    outbox:
      enabled: ${BLUENOTE_OUTBOX_DISPATCH_ENABLED:true}
      tables:
        - table-name: bluenote_file.file_outbox_event
        - table-name: bluenote_note.note_outbox_event
        - table-name: bluenote_comment.comment_outbox_event

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
