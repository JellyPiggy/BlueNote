server:
  port: 8084

spring:
  application:
    name: bluenote-order-app
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${BLUENOTE_ORDER_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/bluenote_order?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${BLUENOTE_ORDER_DATASOURCE_USERNAME:root}
    password: ${BLUENOTE_ORDER_DATASOURCE_PASSWORD:change_me_local_mysql_root}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${BLUENOTE_REDIS_HOST:127.0.0.1}
      port: ${BLUENOTE_REDIS_PORT:6379}
      password: ${BLUENOTE_REDIS_PASSWORD:change_me_local_redis}
      timeout: 2s

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

bluenote:
  env: ${BLUENOTE_ENV:local}
  internal:
    member-uri: ${BLUENOTE_MEMBER_INTERNAL_URI:http://127.0.0.1:8081}
  security:
    access-token:
      secret: ${BLUENOTE_ACCESS_TOKEN_SECRET:bluenote-local-access-token-secret-change-me-32chars}
      issuer: ${BLUENOTE_ACCESS_TOKEN_ISSUER:bluenote}
      expires-in-seconds: ${BLUENOTE_ACCESS_TOKEN_EXPIRES_IN_SECONDS:3600}
  order:
    seckill-token-ttl-seconds: ${BLUENOTE_ORDER_TOKEN_TTL_SECONDS:30}
    redis-retain-minutes: ${BLUENOTE_ORDER_REDIS_RETAIN_MINUTES:60}
    timeout-scan-batch-size: ${BLUENOTE_ORDER_TIMEOUT_SCAN_BATCH_SIZE:50}
    consumer-executor:
      seckill:
        core-size: ${BLUENOTE_ORDER_SECKILL_CONSUMER_CORE_SIZE:4}
        max-size: ${BLUENOTE_ORDER_SECKILL_CONSUMER_MAX_SIZE:4}
        queue-capacity: ${BLUENOTE_ORDER_SECKILL_CONSUMER_QUEUE_CAPACITY:100}
        keep-alive-seconds: ${BLUENOTE_ORDER_SECKILL_CONSUMER_KEEP_ALIVE_SECONDS:60}
        await-timeout-seconds: ${BLUENOTE_ORDER_SECKILL_CONSUMER_AWAIT_TIMEOUT_SECONDS:60}
      timeout:
        core-size: ${BLUENOTE_ORDER_TIMEOUT_CONSUMER_CORE_SIZE:1}
        max-size: ${BLUENOTE_ORDER_TIMEOUT_CONSUMER_MAX_SIZE:2}
        queue-capacity: ${BLUENOTE_ORDER_TIMEOUT_CONSUMER_QUEUE_CAPACITY:50}
        keep-alive-seconds: ${BLUENOTE_ORDER_TIMEOUT_CONSUMER_KEEP_ALIVE_SECONDS:60}
        await-timeout-seconds: ${BLUENOTE_ORDER_TIMEOUT_CONSUMER_AWAIT_TIMEOUT_SECONDS:60}
  mq:
    enabled: ${BLUENOTE_MQ_ENABLED:true}
    name-server: ${BLUENOTE_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
    producer-group: ${BLUENOTE_ORDER_MQ_PRODUCER_GROUP:bluenote-order-outbox-producer}
    outbox:
      enabled: ${BLUENOTE_OUTBOX_DISPATCH_ENABLED:true}
      tables:
        - table-name: bluenote_order.order_outbox_event

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
