server:
  port: 8083

spring:
  application:
    name: bluenote-social-app
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${BLUENOTE_SOCIAL_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/bluenote_relation?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${BLUENOTE_SOCIAL_DATASOURCE_USERNAME:root}
    password: ${BLUENOTE_SOCIAL_DATASOURCE_PASSWORD:bluenote_root_local}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${BLUENOTE_REDIS_HOST:127.0.0.1}
      port: ${BLUENOTE_REDIS_PORT:6379}
      password: ${BLUENOTE_REDIS_PASSWORD:bluenote_redis_local}
      timeout: 2s

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

bluenote:
  env: ${BLUENOTE_ENV:local}
  internal:
    member-uri: ${BLUENOTE_MEMBER_INTERNAL_URI:http://127.0.0.1:8081}
    content-uri: ${BLUENOTE_CONTENT_INTERNAL_URI:http://127.0.0.1:8082}
  security:
    access-token:
      secret: ${BLUENOTE_ACCESS_TOKEN_SECRET:bluenote-local-access-token-secret-change-me-32chars}
      issuer: ${BLUENOTE_ACCESS_TOKEN_ISSUER:bluenote}
      expires-in-seconds: ${BLUENOTE_ACCESS_TOKEN_EXPIRES_IN_SECONDS:3600}
  push:
    realtime:
      websocket-url: ${BLUENOTE_PUSH_WEBSOCKET_URL:/ws/realtime}
      node-id: ${BLUENOTE_PUSH_REALTIME_NODE_ID:${spring.application.name}}
    offline:
      enabled: ${BLUENOTE_PUSH_OFFLINE_ENABLED:false}
  mq:
    enabled: ${BLUENOTE_MQ_ENABLED:true}
    name-server: ${BLUENOTE_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
    producer-group: ${BLUENOTE_SOCIAL_MQ_PRODUCER_GROUP:bluenote-social-outbox-producer}
    outbox:
      enabled: ${BLUENOTE_OUTBOX_DISPATCH_ENABLED:true}
      tables:
        - table-name: bluenote_relation.relation_outbox_event
        - table-name: bluenote_counter.counter_outbox_event
        - table-name: bluenote_feed.feed_outbox_event
        - table-name: bluenote_notification.notification_outbox_event
        - table-name: bluenote_push.push_outbox_event

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
