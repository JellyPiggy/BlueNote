server:
  port: 8080

spring:
  application:
    name: bluenote-gateway-app
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
