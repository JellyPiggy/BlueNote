server:
  port: 8081

spring:
  application:
    name: bluenote-member-app
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${BLUENOTE_MEMBER_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/bluenote_auth?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${BLUENOTE_MEMBER_DATASOURCE_USERNAME:root}
    password: ${BLUENOTE_MEMBER_DATASOURCE_PASSWORD:change_me_local_mysql_root}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

bluenote:
  security:
    access-token:
      secret: ${BLUENOTE_ACCESS_TOKEN_SECRET:bluenote-local-access-token-secret-change-me-32chars}
      issuer: ${BLUENOTE_ACCESS_TOKEN_ISSUER:bluenote}
      expires-in-seconds: ${BLUENOTE_ACCESS_TOKEN_EXPIRES_IN_SECONDS:3600}
  internal:
    counter-uri: ${BLUENOTE_COUNTER_INTERNAL_URI:http://127.0.0.1:8083}
    file-uri: ${BLUENOTE_FILE_INTERNAL_URI:http://127.0.0.1:8082}
  mq:
    enabled: ${BLUENOTE_MQ_ENABLED:true}
    name-server: ${BLUENOTE_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
    producer-group: ${BLUENOTE_MEMBER_MQ_PRODUCER_GROUP:bluenote-member-outbox-producer}
    outbox:
      enabled: ${BLUENOTE_OUTBOX_DISPATCH_ENABLED:true}
      tables:
        - table-name: bluenote_auth.auth_outbox_event
          status-column: status
        - table-name: bluenote_user.user_outbox_event

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
